<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="seal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a9bb0"/>
      <stop offset="100%" stop-color="#5a6b7a"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8c8d8"/>
      <stop offset="100%" stop-color="#8a9aaa"/>
    </linearGradient>
    <linearGradient id="hp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a030"/>
      <stop offset="100%" stop-color="#c07020"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bg)" stroke="#2a2a4a" stroke-width="6"/>

  <!-- Seal body -->
  <ellipse cx="256" cy="310" rx="110" ry="130" fill="url(#seal)"/>
  <!-- Belly -->
  <ellipse cx="256" cy="330" rx="70" ry="95" fill="url(#belly)"/>

  <!-- Seal head -->
  <circle cx="256" cy="195" r="75" fill="url(#seal)"/>
  <!-- Face lighter area -->
  <ellipse cx="256" cy="210" rx="50" ry="45" fill="url(#belly)"/>

  <!-- Eyes -->
  <ellipse cx="232" cy="192" rx="12" ry="14" fill="#1a1a2e"/>
  <ellipse cx="280" cy="192" rx="12" ry="14" fill="#1a1a2e"/>
  <!-- Eye shine -->
  <circle cx="236" cy="188" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="284" cy="188" r="4" fill="#fff" opacity="0.8"/>

  <!-- Nose -->
  <ellipse cx="256" cy="218" rx="14" ry="10" fill="#3a3a4a"/>
  <!-- Nose shine -->
  <ellipse cx="253" cy="215" rx="5" ry="3" fill="#5a5a6a" opacity="0.6"/>

  <!-- Whiskers -->
  <line x1="210" y1="215" x2="170" y2="205" stroke="#c0d0e0" stroke-width="2" opacity="0.6"/>
  <line x1="210" y1="222" x2="168" y2="222" stroke="#c0d0e0" stroke-width="2" opacity="0.6"/>
  <line x1="210" y1="229" x2="170" y2="239" stroke="#c0d0e0" stroke-width="2" opacity="0.6"/>
  <line x1="302" y1="215" x2="342" y2="205" stroke="#c0d0e0" stroke-width="2" opacity="0.6"/>
  <line x1="302" y1="222" x2="344" y2="222" stroke="#c0d0e0" stroke-width="2" opacity="0.6"/>
  <line x1="302" y1="229" x2="342" y2="239" stroke="#c0d0e0" stroke-width="2" opacity="0.6"/>

  <!-- Mouth (slight smile) -->
  <path d="M 240 230 Q 256 242 272 230" fill="none" stroke="#3a3a4a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Flippers -->
  <ellipse cx="165" cy="340" rx="35" ry="18" fill="url(#seal)" transform="rotate(-25 165 340)"/>
  <ellipse cx="347" cy="340" rx="35" ry="18" fill="url(#seal)" transform="rotate(25 347 340)"/>

  <!-- Headphones band -->
  <path d="M 175 185 Q 175 110 256 105 Q 337 110 337 185" fill="none" stroke="url(#hp)" stroke-width="12" stroke-linecap="round"/>

  <!-- Headphone left ear cup -->
  <rect x="155" y="175" width="30" height="42" rx="8" fill="url(#hp)"/>
  <rect x="160" y="180" width="20" height="32" rx="5" fill="#2a1a0a"/>

  <!-- Headphone right ear cup -->
  <rect x="327" y="175" width="30" height="42" rx="8" fill="url(#hp)"/>
  <rect x="332" y="180" width="20" height="32" rx="5" fill="#2a1a0a"/>

  <!-- Music notes floating -->
  <!-- Note 1 (left) -->
  <g transform="translate(120, 130) rotate(-15)" opacity="0.9">
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#e8a030" stroke-width="3"/>
    <ellipse cx="-5" cy="0" rx="8" ry="6" fill="#e8a030" transform="rotate(-20 -5 0)"/>
    <path d="M 0 -30 Q 12 -35 8 -22" fill="#e8a030"/>
  </g>

  <!-- Note 2 (right) -->
  <g transform="translate(385, 115) rotate(10)" opacity="0.9">
    <line x1="0" y1="0" x2="0" y2="-28" stroke="#e8a030" stroke-width="3"/>
    <line x1="16" y1="-3" x2="16" y2="-31" stroke="#e8a030" stroke-width="3"/>
    <ellipse cx="-5" cy="0" rx="8" ry="6" fill="#e8a030" transform="rotate(-20 -5 0)"/>
    <ellipse cx="11" cy="-3" rx="8" ry="6" fill="#e8a030" transform="rotate(-20 11 -3)"/>
    <line x1="0" y1="-28" x2="16" y2="-31" stroke="#e8a030" stroke-width="3"/>
  </g>

  <!-- Note 3 (top) -->
  <g transform="translate(310, 80) rotate(5)" opacity="0.7">
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#e8a030" stroke-width="2.5"/>
    <ellipse cx="-4" cy="0" rx="7" ry="5" fill="#e8a030" transform="rotate(-20 -4 0)"/>
    <path d="M 0 -22 Q 10 -26 7 -16" fill="#e8a030"/>
  </g>

  <!-- Subtle glow ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#e8a030" stroke-width="1" opacity="0.15"/>
</svg>
