<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SealSounds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: none;
    }

    body:hover { cursor: default; }

    /* Background images with transitions */
    .bg-image {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      opacity: 0;
      z-index: 0;
      transition: opacity 2s ease-in-out, transform 8s ease-in-out, filter 2s ease-in-out;
      transform-origin: center center;
    }

    .bg-image.active {
      opacity: 1;
    }

    /* Dark overlay for readability */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.3) 0%,
        rgba(0,0,0,0.1) 40%,
        rgba(0,0,0,0.4) 70%,
        rgba(0,0,0,0.85) 100%
      );
      z-index: 1;
    }

    /* Content layer */
    .content {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 40px 60px;
    }

    /* Fact display */
    .fact-container {
      max-width: 700px;
      margin-bottom: 40px;
    }

    .fact-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }

    .fact-text {
      font-size: 20px;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
      transition: opacity 1s ease-in-out;
    }

    /* Now playing bar */
    .now-playing {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .album-art {
      width: 64px;
      height: 64px;
      border-radius: 4px;
      background: #222;
      flex-shrink: 0;
    }

    .track-info {
      flex: 1;
      min-width: 0;
    }

    .track-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .track-artist {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }

    .progress-bar:hover {
      height: 6px;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s linear;
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: 20px;
    }

    .controls button {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      opacity: 0.8;
      transition: opacity 0.2s;
      padding: 4px;
    }

    .controls button:hover {
      opacity: 1;
    }

    /* YouTube player (small corner) */
    .yt-container {
      position: fixed;
      bottom: 120px;
      right: 60px;
      z-index: 3;
      width: 200px;
      height: 113px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      opacity: 0.7;
      transition: opacity 0.3s, transform 0.3s;
    }

    .yt-container:hover {
      opacity: 1;
      transform: scale(1.05);
    }

    /* Search overlay */
    .search-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .search-overlay.hidden {
      display: none;
    }

    .search-overlay h1 {
      font-size: 48px;
      font-weight: 300;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .search-overlay .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 40px;
    }

    .search-box {
      width: 100%;
      max-width: 600px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 16px 24px;
      font-size: 20px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      outline: none;
      font-family: inherit;
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .search-box input:focus {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15);
    }

    .search-results {
      width: 100%;
      max-width: 600px;
      margin-top: 16px;
      max-height: 400px;
      overflow-y: auto;
    }

    .search-result {
      padding: 12px 24px;
      cursor: pointer;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: background 0.2s;
    }

    .search-result:hover {
      background: rgba(255,255,255,0.1);
    }

    .search-result img {
      width: 48px;
      height: 48px;
      border-radius: 4px;
      object-fit: cover;
      background: #333;
    }

    .search-result .result-title {
      font-size: 16px;
    }

    .search-result .result-channel {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .search-hint {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 3;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
    }

    .search-hint:hover {
      color: rgba(255,255,255,0.6);
    }

    .loading {
      color: rgba(255,255,255,0.5);
      font-size: 16px;
      margin-top: 20px;
    }

    /* Error toast */
    .error-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(200, 50, 50, 0.9);
      padding: 16px 24px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 500px;
      text-align: center;
      display: none;
      backdrop-filter: blur(10px);
    }

    .error-toast a {
      color: #fff;
      text-decoration: underline;
      font-weight: 600;
    }

    .error-toast .try-next {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 16px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }

    .error-toast .try-next:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <!-- Background images (two layers for crossfade) -->
  <div class="bg-image active" id="bg1"></div>
  <div class="bg-image" id="bg2"></div>
  <div class="overlay"></div>

  <!-- Search overlay -->
  <div class="search-overlay" id="searchOverlay">
    <h1>SealSounds</h1>
    <p class="subtitle">your album listening room</p>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search for an album... (e.g. Pink Floyd Dark Side full album)" autofocus>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Main content -->
  <div class="content" id="mainContent">
    <div class="fact-container">
      <div class="fact-label">Did you know</div>
      <div class="fact-text" id="factText"></div>
    </div>

    <div class="now-playing">
      <img class="album-art" id="albumArt" src="" alt="Album art">
      <div class="track-info">
        <div class="track-title" id="trackTitle">-</div>
        <div class="track-artist" id="trackArtist">-</div>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-display">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>
      <div class="controls">
        <button id="playPauseBtn" title="Play/Pause">&#9654;</button>
      </div>
    </div>
  </div>

  <div class="search-hint" id="searchHint" style="display:none;">Press Escape to search</div>

  <div class="error-toast" id="errorToast"></div>

  <!-- YouTube Player -->
  <div class="yt-container" id="ytContainer" style="display:none;">
    <div id="ytPlayer"></div>
  </div>

  <script>
    // =========================================================
    // CONFIG - Replace with your own YouTube Data API key
    // Get one at: https://console.cloud.google.com/apis/credentials
    // Enable "YouTube Data API v3" for your project
    // =========================================================
    const YOUTUBE_API_KEY = 'AIzaSyAyQx11EcUDO4IKhrq8M2pGTWY117ksYfk';

    // =========================================================
    // STATE
    // =========================================================
    let player = null;
    let currentImages = [];
    let currentFacts = [];
    let currentImageIndex = 0;
    let currentFactIndex = 0;
    let imageTimer = null;
    let factTimer = null;
    let progressTimer = null;
    let activeBg = 1; // which bg element is currently showing
    let currentVideoId = null;
    let lastSearchResults = [];

    // =========================================================
    // YOUTUBE IFRAME API
    // =========================================================
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    window.onYouTubeIframeAPIReady = function() {
      console.log('YouTube API ready');
    };

    function loadVideo(videoId, title, thumbnail) {
      document.getElementById('searchOverlay').classList.add('hidden');
      document.getElementById('ytContainer').style.display = 'block';
      document.getElementById('searchHint').style.display = 'block';

      currentVideoId = videoId;
      document.getElementById('trackTitle').textContent = title;
      document.getElementById('trackArtist').textContent = 'Loading info...';
      document.getElementById('albumArt').src = thumbnail;

      // Destroy old player if it exists (avoids stale error handlers)
      if (player) {
        player.destroy();
        player = null;
      }

      player = new YT.Player('ytPlayer', {
        width: '200',
        height: '113',
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          controls: 1,
          modestbranding: 1,
          origin: window.location.origin,
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
          onError: onPlayerError,
        }
      });

      // Extract artist name from title for metadata lookups
      const artistGuess = guessArtistFromTitle(title);
      fetchArtistData(artistGuess);
    }

    function onPlayerReady(event) {
      event.target.playVideo();
      startProgressUpdates();
    }

    function onPlayerStateChange(event) {
      const btn = document.getElementById('playPauseBtn');
      if (event.data === YT.PlayerState.PLAYING) {
        btn.innerHTML = '&#10074;&#10074;'; // pause icon
        startProgressUpdates();
      } else {
        btn.innerHTML = '&#9654;'; // play icon
      }
    }

    function onPlayerError(event) {
      const code = event.data;
      const toast = document.getElementById('errorToast');

      if (code === 150 || code === 101) {
        // Embedding disabled by video owner
        const ytLink = `https://www.youtube.com/watch?v=${currentVideoId}`;
        const nextAvailable = lastSearchResults.length > 0;
        toast.innerHTML = `
          This video doesn't allow embedding.<br>
          <a href="${ytLink}" target="_blank">Open on YouTube</a>
          ${nextAvailable ? '<br><span class="try-next" id="tryNextBtn">Try next result</span>' : ''}
        `;
        toast.style.display = 'block';

        if (nextAvailable) {
          setTimeout(() => {
            const btn = document.getElementById('tryNextBtn');
            if (btn) btn.addEventListener('click', tryNextResult);
          }, 0);
        }
      } else {
        toast.innerHTML = `YouTube error (code ${code}). <span class="try-next" id="tryNextBtn">Try next result</span>`;
        toast.style.display = 'block';
        setTimeout(() => {
          const btn = document.getElementById('tryNextBtn');
          if (btn) btn.addEventListener('click', tryNextResult);
        }, 0);
      }
    }

    function tryNextResult() {
      document.getElementById('errorToast').style.display = 'none';
      if (lastSearchResults.length > 0) {
        const next = lastSearchResults.shift();
        loadVideo(next.id, next.title, next.thumbnail);
      }
    }

    function startProgressUpdates() {
      clearInterval(progressTimer);
      progressTimer = setInterval(() => {
        if (!player || !player.getDuration) return;
        const current = player.getCurrentTime();
        const total = player.getDuration();
        if (total > 0) {
          const pct = (current / total) * 100;
          document.getElementById('progressFill').style.width = pct + '%';
          document.getElementById('currentTime').textContent = formatTime(current);
          document.getElementById('totalTime').textContent = formatTime(total);
        }
      }, 500);
    }

    function formatTime(seconds) {
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60);
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // =========================================================
    // SEARCH (YouTube Data API)
    // =========================================================
    const searchInput = document.getElementById('searchInput');
    let searchTimeout = null;

    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        const query = searchInput.value.trim();
        if (query.length > 2) {
          searchYouTube(query);
        }
      }, 500);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const firstResult = document.querySelector('.search-result');
        if (firstResult) firstResult.click();
      }
    });

    async function searchYouTube(query) {
      const resultsContainer = document.getElementById('searchResults');

      if (!YOUTUBE_API_KEY) {
        resultsContainer.innerHTML = `
          <div class="loading">
            <p>No API key configured.</p>
            <p style="margin-top:8px; font-size:13px; color:rgba(255,255,255,0.4);">
              Open index.html and set YOUTUBE_API_KEY at the top of the script section.<br>
              Get a free key at console.cloud.google.com → YouTube Data API v3
            </p>
          </div>`;
        return;
      }

      resultsContainer.innerHTML = '<div class="loading">Searching...</div>';

      try {
        const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query + ' full album')}&type=video&videoDuration=long&maxResults=8&key=${YOUTUBE_API_KEY}`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (data.error) {
          resultsContainer.innerHTML = `<div class="loading">API error: ${data.error.message}</div>`;
          return;
        }

        resultsContainer.innerHTML = '';
        const items = data.items || [];
        items.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = 'search-result';
          div.innerHTML = `
            <img src="${item.snippet.thumbnails.default.url}" alt="">
            <div>
              <div class="result-title">${item.snippet.title}</div>
              <div class="result-channel">${item.snippet.channelTitle}</div>
            </div>`;
          div.addEventListener('click', () => {
            // Store remaining results for "try next"
            lastSearchResults = items.slice(index + 1).map(i => ({
              id: i.id.videoId,
              title: i.snippet.title,
              thumbnail: i.snippet.thumbnails.high.url,
            }));
            document.getElementById('errorToast').style.display = 'none';
            loadVideo(
              item.id.videoId,
              item.snippet.title,
              item.snippet.thumbnails.high.url
            );
          });
          resultsContainer.appendChild(div);
        });
      } catch (err) {
        resultsContainer.innerHTML = `<div class="loading">Search failed: ${err.message}</div>`;
      }
    }

    // =========================================================
    // ARTIST DATA (Wikipedia + Wikimedia Commons)
    // =========================================================
    function guessArtistFromTitle(title) {
      // Try to extract artist name from typical "Artist - Album (Full Album)" patterns
      const patterns = [
        /^(.+?)\s*[-–—]\s*.+?full\s*album/i,
        /^(.+?)\s*[-–—]\s*/i,
        /^(.+?)\s*full\s*album/i,
      ];
      for (const p of patterns) {
        const m = title.match(p);
        if (m) return m[1].trim();
      }
      return title.split(' ').slice(0, 2).join(' ');
    }

    async function fetchArtistData(artist) {
      document.getElementById('trackArtist').textContent = artist;

      // Fetch Wikipedia summary and images in parallel
      await Promise.all([
        fetchWikipediaFacts(artist),
        fetchWikimediaImages(artist),
      ]);
    }

    async function fetchWikipediaFacts(artist) {
      try {
        // Use Wikipedia API to get the page extract
        const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(artist)}`;
        const resp = await fetch(url);
        const data = await resp.json();

        let facts = [];

        if (data.extract) {
          // Split into sentences and use as facts
          const sentences = data.extract.match(/[^.!?]+[.!?]+/g) || [data.extract];
          facts = sentences
            .map(s => s.trim())
            .filter(s => s.length > 30 && s.length < 300);
        }

        // Also try to get the full article for more facts
        try {
          const sectionsUrl = `https://en.wikipedia.org/api/rest_v1/page/mobile-sections/${encodeURIComponent(artist)}`;
          const sectionsResp = await fetch(sectionsUrl);
          const sectionsData = await sectionsResp.json();

          if (sectionsData.remaining && sectionsData.remaining.sections) {
            for (const section of sectionsData.remaining.sections) {
              if (section.text) {
                // Strip HTML tags
                const text = section.text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
                const sentences = text.match(/[^.!?]+[.!?]+/g) || [];
                const interesting = sentences
                  .map(s => s.trim())
                  .filter(s => s.length > 40 && s.length < 280 && !s.includes('['));
                facts.push(...interesting.slice(0, 3));
              }
            }
          }
        } catch (e) {
          console.log('Could not fetch full article:', e);
        }

        if (facts.length === 0) {
          facts = [`${artist} — enjoy the music.`];
        }

        currentFacts = facts;
        currentFactIndex = 0;
        showNextFact();
        startFactRotation();
      } catch (err) {
        console.error('Wikipedia fetch failed:', err);
        currentFacts = [`Now playing: ${artist}`];
        showNextFact();
      }
    }

    async function fetchWikimediaImages(artist) {
      try {
        // Search Wikimedia Commons for artist images
        const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrsearch=${encodeURIComponent(artist + ' band')}&gsrlimit=15&prop=imageinfo&iiprop=url|mime&iiurlwidth=1920&format=json&origin=*`;
        const resp = await fetch(url);
        const data = await resp.json();

        const images = [];
        if (data.query && data.query.pages) {
          for (const page of Object.values(data.query.pages)) {
            if (page.imageinfo && page.imageinfo[0]) {
              const info = page.imageinfo[0];
              if (info.mime && info.mime.startsWith('image/') && info.mime !== 'image/svg+xml') {
                // Use thumbnail URL (resized to 1920px width) or original
                const imgUrl = info.thumburl || info.url;
                images.push(imgUrl);
              }
            }
          }
        }

        if (images.length === 0) {
          // Fallback: try just the artist name without "band"
          return fetchWikimediaImagesFallback(artist);
        }

        currentImages = images;
        currentImageIndex = 0;
        showNextImage();
        startImageRotation();
      } catch (err) {
        console.error('Wikimedia fetch failed:', err);
      }
    }

    async function fetchWikimediaImagesFallback(artist) {
      try {
        const url = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrnamespace=6&gsrsearch=${encodeURIComponent(artist)}&gsrlimit=10&prop=imageinfo&iiprop=url|mime&iiurlwidth=1920&format=json&origin=*`;
        const resp = await fetch(url);
        const data = await resp.json();

        const images = [];
        if (data.query && data.query.pages) {
          for (const page of Object.values(data.query.pages)) {
            if (page.imageinfo && page.imageinfo[0]) {
              const info = page.imageinfo[0];
              if (info.mime && info.mime.startsWith('image/') && info.mime !== 'image/svg+xml') {
                images.push(info.thumburl || info.url);
              }
            }
          }
        }

        currentImages = images;
        if (images.length > 0) {
          currentImageIndex = 0;
          showNextImage();
          startImageRotation();
        }
      } catch (err) {
        console.error('Fallback image fetch failed:', err);
      }
    }

    // =========================================================
    // IMAGE ROTATION with random effects
    // =========================================================
    const transitionEffects = [
      // [startTransform, endTransform, filter, label]
      { // Slow zoom in
        start: 'scale(1)',
        end: 'scale(1.15)',
        filter: 'none',
      },
      { // Slow zoom out
        start: 'scale(1.2)',
        end: 'scale(1)',
        filter: 'none',
      },
      { // Pan left to right
        start: 'scale(1.15) translateX(-5%)',
        end: 'scale(1.15) translateX(5%)',
        filter: 'none',
      },
      { // Pan right to left
        start: 'scale(1.15) translateX(5%)',
        end: 'scale(1.15) translateX(-5%)',
        filter: 'none',
      },
      { // Zoom in + slight rotation
        start: 'scale(1) rotate(0deg)',
        end: 'scale(1.12) rotate(1.5deg)',
        filter: 'none',
      },
      { // Warm tint + zoom
        start: 'scale(1)',
        end: 'scale(1.1)',
        filter: 'sepia(0.3) saturate(1.3)',
      },
      { // Cool tint + pan up
        start: 'scale(1.15) translateY(3%)',
        end: 'scale(1.15) translateY(-3%)',
        filter: 'saturate(0.8) brightness(1.1)',
      },
      { // High contrast + zoom
        start: 'scale(1.05)',
        end: 'scale(1.18)',
        filter: 'contrast(1.15) brightness(1.05)',
      },
      { // Slight desaturate + slow pan diagonal
        start: 'scale(1.1) translate(-3%, 2%)',
        end: 'scale(1.1) translate(3%, -2%)',
        filter: 'saturate(0.7)',
      },
      { // Dreamy bloom
        start: 'scale(1)',
        end: 'scale(1.08)',
        filter: 'brightness(1.15) blur(1px)',
      },
    ];

    function showNextImage() {
      if (currentImages.length === 0) return;

      const nextIndex = currentImageIndex % currentImages.length;
      const imageUrl = currentImages[nextIndex];
      const effect = transitionEffects[Math.floor(Math.random() * transitionEffects.length)];

      // Preload the image
      const img = new Image();
      img.onload = () => {
        const nextBg = activeBg === 1 ? 2 : 1;
        const nextEl = document.getElementById('bg' + nextBg);
        const currEl = document.getElementById('bg' + activeBg);

        // Reset the incoming element: disable transition, set start state
        nextEl.style.transition = 'none';
        nextEl.style.transform = effect.start;
        nextEl.style.filter = effect.filter;
        nextEl.style.backgroundImage = `url(${imageUrl})`;

        // Force reflow so the start state is applied before animating
        nextEl.offsetHeight;

        // Re-enable transitions and animate
        nextEl.style.transition = 'opacity 2s ease-in-out, transform 8s ease-in-out, filter 2s ease-in-out';
        nextEl.style.transform = effect.end;
        nextEl.classList.add('active');
        currEl.classList.remove('active');

        activeBg = nextBg;
      };
      img.src = imageUrl;

      currentImageIndex++;
    }

    function startImageRotation() {
      clearInterval(imageTimer);
      imageTimer = setInterval(showNextImage, 8000);
    }

    // =========================================================
    // FACT ROTATION
    // =========================================================
    function showNextFact() {
      if (currentFacts.length === 0) return;
      const fact = currentFacts[currentFactIndex % currentFacts.length];
      const el = document.getElementById('factText');
      el.style.opacity = 0;
      setTimeout(() => {
        el.textContent = fact;
        el.style.opacity = 1;
      }, 500);
      currentFactIndex++;
    }

    function startFactRotation() {
      clearInterval(factTimer);
      factTimer = setInterval(showNextFact, 12000); // every 12 seconds
    }

    // =========================================================
    // CONTROLS
    // =========================================================
    document.getElementById('playPauseBtn').addEventListener('click', () => {
      if (!player) return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.PLAYING) {
        player.pauseVideo();
      } else {
        player.playVideo();
      }
    });

    // Click on progress bar to seek
    document.getElementById('progressBar').addEventListener('click', (e) => {
      if (!player || !player.getDuration) return;
      const rect = e.target.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      player.seekTo(pct * player.getDuration(), true);
    });

    // Press Escape or Space to toggle search
    document.addEventListener('keydown', (e) => {
      const overlay = document.getElementById('searchOverlay');
      if (e.key === 'Escape') {
        if (!overlay.classList.contains('hidden')) {
          overlay.classList.add('hidden');
        } else {
          overlay.classList.remove('hidden');
          document.getElementById('searchInput').focus();
        }
      }
    });

    document.getElementById('searchHint').addEventListener('click', () => {
      const overlay = document.getElementById('searchOverlay');
      overlay.classList.remove('hidden');
      document.getElementById('searchInput').focus();
    });
  </script>
</body>
</html>
